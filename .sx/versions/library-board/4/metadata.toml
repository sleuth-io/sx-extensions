[asset]
  name = "library-board"
  version = "4"
  type = "app-plugin"
  description = "A full-page curation view: an editable metadata grid (owner, status, keywords across many assets at once) and a draft pipeline board with publish-stage warnings. Inspired by Obsidian's Projects, DB Folder, and Kanban."

[app-plugin]
  entry = "main.js"
  permissions = ["assets:read", "assets:write-metadata", "drafts:write", "usage:read", "views:main", "events"]
