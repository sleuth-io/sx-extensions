[asset]
  name = "asset-relations"
  version = "2"
  type = "app-plugin"
  description = "Who depends on what: a Relations tab with references in and out, an orphans-and-hubs widget, and publish warnings for broken or high-impact references. Inspired by Obsidian's Strange New Worlds and Breadcrumbs."

[app-plugin]
  entry = "main.js"
  permissions = ["assets:read", "usage:read", "events", "views:asset-tab", "views:dashboard"]
