[asset]
  name = "style-linter"
  version = "4"
  type = "app-plugin"
  description = "Formatting-consistency checks at publish time — heading hierarchy, whitespace, code-fence languages — with toggleable rules and a whole-library lint. Inspired by Obsidian's Linter."

[app-plugin]
  entry = "main.js"
  permissions = ["assets:read", "events", "views:sidebar", "views:asset-tab"]
