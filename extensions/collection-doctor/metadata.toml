[asset]
name = "collection-doctor"
version = "1.0.0"
type = "app-plugin"
description = "Scores a collection's health 0-100 with clickable findings: thin descriptions, stale or unused assets, and oversized skills. Inspired by Obsidian's Zoottelkeeper and folder-health plugins."

[app-plugin]
entry = "main.js"
permissions = ["views:collection", "assets:read", "usage:read"]
