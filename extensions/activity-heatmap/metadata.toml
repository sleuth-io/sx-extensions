[asset]
name = "activity-heatmap"
version = "1.0.0"
type = "app-plugin"
description = "A GitHub-style year heatmap of library activity on the dashboard — usage or edits, with streaks and per-day drill-down. Inspired by Obsidian's Heatmap Calendar."

[app-plugin]
entry = "main.js"
permissions = ["usage:read", "views:dashboard"]
