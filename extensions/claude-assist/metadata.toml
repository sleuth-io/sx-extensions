[asset]
name = "claude-assist"
version = "1.0.0"
type = "app-plugin"
description = "Ask questions about your library and get cited answers, critique the draft you have open as a prompt, or turn a plain-language description into a new skill draft — powered by the Claude API with your own key, stored in your OS keychain."

[app-plugin]
entry = "main.js"
permissions = ["assets:read", "drafts:write", "editor", "commands", "views:main", "secrets", "net:api.anthropic.com"]
