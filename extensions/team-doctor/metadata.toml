[asset]
name = "team-doctor"
version = "1.0.0"
type = "app-plugin"
description = "Scores a team's library health 0-100 with clickable findings — stale shares, assets the team never uses, thin descriptions, inactive members — plus a this-week activity digest. Inspired by Obsidian's folder-health plugins and Vault Changelog."

[app-plugin]
entry = "main.js"
permissions = ["views:team", "assets:read", "usage:read"]
